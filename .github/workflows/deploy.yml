name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $EC2_USER@$EC2_HOST << 'ENDSSH'
            cd ~/satellite-collision-risk-detector
            git pull origin main
            docker build -t satellite-app .
            docker stop satellite-app || true
            docker rm satellite-app || true
            docker run -d \
              --name satellite-app \
              --restart unless-stopped \
              -p 8000:8000 \
              -v ~/satellite-data:/app/data \
              -e DATABASE_URL=sqlite:////app/data/satellite_tracking.db \
              satellite-app
          ENDSSH
          rm -f /tmp/deploy_key
